<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3255"/>
      <stop offset="100%" stop-color="#2B4C7E"/>
    </linearGradient>
  </defs>

  <!-- 背景: 藍色の角丸四角 -->
