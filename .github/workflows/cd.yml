name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: kyugo-ai-dev
  REGION: asia-northeast1
  SERVICE_NAME: kyugo-ai
  IMAGE: asia-northeast1-docker.pkg.dev/kyugo-ai-dev/kyugo-ai-docker/kyugo-ai

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Frontend test
        working-directory: frontend
        run: |
          npm ci
          npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/880774580577/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "kyugo-ai-deployer@kyugo-ai-dev.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }} \
            --build-arg VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars="^::^GCP_PROJECT_ID=${{ env.PROJECT_ID }}::GCP_REGION=${{ env.REGION }}::ALLOWED_EMAIL_DOMAINS=osaka-fujinhome.or.jp::ALLOWED_EMAILS=hy.unimail.11@gmail.com" \
            --service-account=kyugo-ai-deployer@kyugo-ai-dev.iam.gserviceaccount.com \
            --quiet
